version: 3
tasks:
  default:
    cmds:
      - go build -o ./bin/pawnfmt/pawnfmt ./cmd/pawnfmt

  test:
    cmds:
      - go test ./...

  vet:
    cmds:
      - go vet ./...

  lint:
    cmds:
      - golangci-lint run ./...

  check:
    deps: [vet, lint]
    cmds:
      - |
        fmt_out="$(gofmt -l .)"
        test -z "$fmt_out" || { echo "$fmt_out"; exit 1; }
      - go build ./...
      - CGO_ENABLED=1 go test -race -shuffle=on ./...

  bench:
    cmds:
      - go test ./internal/bench/... -bench=. -benchmem -run=^$

  corpus:
    cmds:
      - testdata/real-world/fetch.sh
      - PAWNFMT_CORPUS=1 go test ./internal/format -run=TestCorpusReport
