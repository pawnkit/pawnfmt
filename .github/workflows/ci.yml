name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build, vet, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Cache real-world corpus
        uses: actions/cache@v6
        with:
          path: testdata/real-world
          key: real-world-corpus-${{ hashFiles('testdata/real-world/sources.tsv') }}

      - name: Fetch real-world corpus
        run: testdata/real-world/fetch.sh

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          only-new-issues: true

  security:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: govulncheck
        run: go tool govulncheck ./...

  fuzz-smoke:
    name: Fuzz smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Fuzz formatter convergence
        run: go test ./internal/format/... -run=^$ -fuzz=FuzzFormatConverges -fuzztime=30s

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run benchmarks
        run: go test ./internal/bench/... -bench=. -benchmem -run=^$ -benchtime=3x | tee bench-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: bench-results.txt
